name: Daily Stock Alert

on:
  schedule:
    - cron: '45 3 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r stock-alert-bot/requirements.txt

      - name: Run Stock Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python stock-alert-bot/scheduler.py
